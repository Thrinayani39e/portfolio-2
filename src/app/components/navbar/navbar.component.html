    <!-- Mobile hamburger -->
    <button class="hamburger" [class.open]="menuOpen()" (click)="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile drawer -->
  <div class="mobile-drawer" [class.open]="menuOpen()">
    <ul>
      <li>
        <button class="drawer-link" [class.active]="active === 'hero'" (click)="navigate('hero')">
          <span class="dl-sym">~/</span> home
        </button>
      </li>
      <li *ngFor="let link of navLinks">
        <button class="drawer-link" [class.active]="active === link.id" (click)="navigate(link.id)">
          <span class="dl-sym">./</span> {{ link.label.toLowerCase() }}
        </button>
      </li>
      <li>
        <a [href]="owner.github" target="_blank" rel="noopener noreferrer" class="drawer-link drawer-gh">
          <span class="dl-sym">↗</span> github
        </a>
