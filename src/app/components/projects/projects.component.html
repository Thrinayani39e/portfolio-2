<section class="section" id="projects">
  <div class="container">

    <div class="term-header reveal">
      <span class="th-comment"># featured work</span>
      <div class="prompt">
        <span class="p-user">thri</span><span class="p-at">&#64;</span><span class="p-host">portfolio</span><span class="p-colon">:</span><span class="p-path">~</span><span class="p-sym">$</span>
        <span class="p-cmd">ls </span><span class="p-flag">-la </span><span class="p-arg">~/projects/</span>
      </div>
    </div>

    <div class="projects-list">
      <div *ngFor="let p of projects; let i = index" #projectCard class="project-row reveal" [class]="'delay-' + (i + 1)">

        <div class="dir-line">
          <span class="dir-perms">drwxr-xr-x</span>
          <span class="dir-name">
            <a [href]="p.github" target="_blank" rel="noopener noreferrer" class="dir-link">{{ p.slug }}/</a>
          </span>
          <span class="tag green" *ngIf="p.featured">featured</span>
        </div>

        <div class="project-panel term-block">
          <div class="term-body proj-body" [class.has-image]="p.image">

            <!-- Left: all content -->
            <div class="proj-content">
              <div class="proj-header">
                <div>
                  <p class="proj-title">{{ p.title }}</p>
                  <p class="proj-sub c-comment">// {{ p.subtitle }}</p>
                </div>
                <a [href]="p.github" target="_blank" rel="noopener noreferrer" class="btn btn-secondary proj-gh">
                  <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                  view
                </a>
              </div>
              <p class="proj-desc c-comment">/* {{ p.description }} */</p>
              <div class="proj-highlights">
                <div class="hl-line" *ngFor="let h of p.highlights">
                  <span class="hl-arrow">→</span> {{ h }}
                </div>
              </div>
              <div class="proj-tags">
                <span class="tag" [class.green]="p.color === 'cyan'" *ngFor="let t of p.tags">{{ t }}</span>
              </div>
            </div>

            <!-- Right: image (only if present) -->
            <div class="proj-image-col" *ngIf="p.image">
              <div class="proj-image-wrap">
                <img [src]="p.image" [alt]="p.title + ' illustration'" class="proj-image" loading="lazy">
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>

  </div>
</section>
